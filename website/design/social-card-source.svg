    </linearGradient>
    <radialGradient id="orb" cx="42%" cy="40%" r="60%">
      <stop offset="0" stop-color="#67d5ff" stop-opacity=".75"/>
      <stop offset=".48" stop-color="#756cff" stop-opacity=".3"/>
      <stop offset="1" stop-color="#050609" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
