    <rect x="10" y="24" width="268" height="526" rx="44" fill="#090b11" stroke="#3b3f49" stroke-width="5"/>
    <rect x="25" y="39" width="238" height="496" rx="32" fill="#0d0f16" stroke="#292d37"/>
