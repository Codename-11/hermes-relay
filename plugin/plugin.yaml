name: hermes-relay
manifest_version: 1
version: 1.1.0
description: "Hermes-Relay plugin for QR pairing, relay sessions, dashboard management, remote desktop/phone tooling, and optional legacy compatibility diagnostics. Standard chat, Manage, and dashboard voice remain vanilla upstream Hermes surfaces."
author: Axiom Labs
requires_env: []
provides_tools:
  - android_ping
  - android_read_screen
  - android_find_nodes
  - android_tap
  - android_tap_text
  - android_long_press
  - android_type
  - android_swipe
  - android_drag
  - android_open_app
  - android_press_key
  - android_screenshot
  - android_scroll
  - android_wait
  - android_get_apps
  - android_current_app
  - android_media
  - android_describe_node
  - android_setup
  - android_macro
  - android_clipboard_read
  - android_clipboard_write
  - android_screen_hash
  - android_diff_screen
  - android_send_intent
  - android_broadcast
  - android_events
  - android_event_stream
  - android_location
  - android_search_contacts
  - android_call
  - android_send_sms
  - android_return_to_hermes
  - android_share_media
  - android_send_mms
  - desktop_read_file
  - desktop_write_file
  - desktop_search_files
  - desktop_terminal
  - desktop_patch
  - desktop_powershell
  - desktop_spawn_detached
  - desktop_list_processes
  - desktop_kill_process
  - desktop_find_pid_by_port
  - desktop_job_start
