<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <title>Hermes-Relay Terminal</title>
    <link rel="stylesheet" href="xterm.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1A1A2E;
            overflow: hidden;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Mono', 'Roboto Mono', monospace;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        #terminal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 8px 6px 0 8px;
            box-sizing: border-box;
        }
        .xterm .xterm-viewport {
            background-color: #1A1A2E !important;
        }
        /* Let text inside the terminal be selectable so copy/paste works. */
        .xterm-rows, .xterm-selection-layer {
            -webkit-user-select: text;
            user-select: text;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script src="xterm.js"></script>
    <script src="addon-fit.js"></script>
    <script src="addon-web-links.js"></script>
    <script src="addon-search.js"></script>
    <script>
    (function () {
        // ── Hermes-Relay theme (matches app primary palette) ──────────────
        const hermesTheme = {
            background: '#1A1A2E',
            foreground: '#E8E8F0',
            cursor: '#B794F4',
            cursorAccent: '#1A1A2E',
            selectionBackground: '#4A3A7A',
            black: '#1A1A2E',
            red: '#FF6B9D',
            green: '#7EE787',
            yellow: '#FFD166',
            blue: '#79C0FF',
            magenta: '#B794F4',
            cyan: '#56D4DD',
            white: '#E8E8F0',
            brightBlack: '#4A4A6A',
            brightRed: '#FF8FAE',
            brightGreen: '#A8F0B0',
            brightYellow: '#FFE29A',
            brightBlue: '#A5D4FF',
            brightMagenta: '#D0B3FF',
            brightCyan: '#7FE5EE',
            brightWhite: '#FFFFFF',
        };

        const term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Mono', 'Roboto Mono', monospace",
            fontSize: 13,
            lineHeight: 1.15,
            letterSpacing: 0,
            scrollback: 10000,
            theme: hermesTheme,
            allowProposedApi: true,
            allowTransparency: false,
            convertEol: false,
            macOptionIsMeta: true,
            rightClickSelectsWord: false,
        });

        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon(function (event, uri) {
            // Delegate to Android so taps open the system browser.
            if (window.AndroidBridge && window.AndroidBridge.onLink) {
                window.AndroidBridge.onLink(uri);
            }
        });

        // Search addon — vendored from @xterm/addon-search@0.15.0. Loaded
        // here so the Compose-side TerminalSearchBar can call findNext /
        // findPrevious through the window.search* shims defined below.
        // Wrapped in a try because if vendoring ever fails or the global
        // shape changes, we want the rest of the terminal to keep working
        // rather than turning the whole tab into a JS error.
        let searchAddon = null;
        try {
            if (window.SearchAddon && window.SearchAddon.SearchAddon) {
                searchAddon = new SearchAddon.SearchAddon();
            }
        } catch (err) {
            console.warn('SearchAddon init failed: ' + err);
        }

        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);
        if (searchAddon) {
            try { term.loadAddon(searchAddon); } catch (err) {
                console.warn('SearchAddon loadAddon failed: ' + err);
                searchAddon = null;
            }
        }

        term.open(document.getElementById('terminal'));
        try { fitAddon.fit(); } catch (_) { /* container not measured yet */ }

        // ── Outbound: terminal → Android ──────────────────────────────────
        term.onData(function (data) {
            if (window.AndroidBridge && window.AndroidBridge.onInput) {
                window.AndroidBridge.onInput(data);
            }
        });

        term.onBinary(function (data) {
            // Binary input (very rare — only used for mouse tracking byte paths).
            if (window.AndroidBridge && window.AndroidBridge.onInput) {
                window.AndroidBridge.onInput(data);
            }
        });

        let lastCols = 0;
        let lastRows = 0;
        term.onResize(function (size) {
            if (size.cols === lastCols && size.rows === lastRows) return;
            lastCols = size.cols;
            lastRows = size.rows;
            if (window.AndroidBridge && window.AndroidBridge.onResize) {
                window.AndroidBridge.onResize(size.cols, size.rows);
            }
        });

        // ── Inbound: Android → terminal ───────────────────────────────────
        // Base64-encoded payloads avoid JS string-escaping headaches when the
        // stream contains control characters, raw escape sequences, or bytes
        // that would need careful quoting in evaluateJavascript.
        let writeCount = 0;
        window.writeTerminal = function (b64) {
            if (!b64) return;
            try {
                const binary = atob(b64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                term.write(bytes);
                writeCount++;
                // Diagnostic: dump xterm geometry + container metrics every few
                // writes so we can see from logcat whether xterm has a sane
                // viewport and rows. Routed through onConsoleMessage → the
                // TerminalWebView tag.
                if (writeCount <= 2 || writeCount % 5 === 0) {
                    const el = document.getElementById('terminal');
                    console.log('xterm state: cols=' + term.cols +
                        ' rows=' + term.rows +
                        ' container=' + el.clientWidth + 'x' + el.clientHeight +
                        ' bytesIn=' + bytes.length);
                }
            } catch (err) {
                console.error('writeTerminal decode error: ' + err);
            }
        };

        // Called by Kotlin's addOnLayoutChangeListener with the WebView's
        // actual dimensions in CSS pixels. We force body + #terminal to those
        // sizes explicitly because Chromium WebView's internal viewport does
        // NOT reliably track native view resizes on Android — `height: 100%`
        // resolves against a stale 0-height viewport on the first composition
        // pass and never recovers without this manual override. With the
        // explicit style set, xterm's fit() reads the correct clientHeight
        // and computes a sane cols/rows.
        window.refit = function (widthCss, heightCss) {
            try {
                if (typeof widthCss === 'number' && typeof heightCss === 'number' &&
                    widthCss > 0 && heightCss > 0) {
                    document.documentElement.style.width = widthCss + 'px';
                    document.documentElement.style.height = heightCss + 'px';
                    document.body.style.width = widthCss + 'px';
                    document.body.style.height = heightCss + 'px';
                    const el = document.getElementById('terminal');
                    if (el) {
                        el.style.width = widthCss + 'px';
                        el.style.height = heightCss + 'px';
                    }
                }
                fitAddon.fit();
                const el2 = document.getElementById('terminal');
                console.log('refit: cols=' + term.cols + ' rows=' + term.rows +
                    ' container=' + (el2 ? el2.clientWidth + 'x' + el2.clientHeight : '?') +
                    ' requested=' + widthCss + 'x' + heightCss);
            } catch (err) {
                console.error('fit error: ' + err);
            }
        };

        window.setFontSize = function (size) {
            try {
                term.options.fontSize = size;
                fitAddon.fit();
            } catch (_) {}
        };

        window.focusTerminal = function () {
            try { term.focus(); } catch (_) {}
        };

        window.clearTerminal = function () {
            try { term.clear(); } catch (_) {}
        };

        window.pasteToTerminal = function (text) {
            if (!text) return;
            try {
                term.paste(text);
            } catch (_) {
                // Fallback — send as plain input
                if (window.AndroidBridge && window.AndroidBridge.onInput) {
                    window.AndroidBridge.onInput(text);
                }
            }
        };

        // ── Scroll shims + gesture ────────────────────────────────────────
        // xterm.js ships a scrollback buffer (scrollback: 10000 above) but
        // has no built-in mobile touch-to-scroll — its input handlers are
        // designed around mouse/wheel events, and it sets touch-action on
        // its root to swallow gestures for selection. That leaves the
        // scrollback unreachable on phones unless we add a translator.
        //
        // Strategy: one finger, mostly-vertical drag → convert delta to
        // line-scroll via term.scrollLines(). The threshold keeps short
        // taps (and their tiny jitter) from triggering scroll; the axis
        // dominance check lets users still long-press for selection or
        // horizontal-swipe for future features without false positives.
        // Every scroll intent on this terminal — gesture, toolbar button,
        // whatever — gets funneled through a synthetic WheelEvent dispatched
        // on xterm's render root. This is deliberately NOT a direct call to
        // term.scrollLines(), because that skips xterm's own buffer + mouse-
        // mode routing. Letting xterm handle the wheel gives us all three
        // correct behaviors for free:
        //
        //   1. Main buffer (at the shell prompt): xterm scrolls its own
        //      10k-line scrollback locally — same as our first version.
        //   2. Alternate buffer + TUI has enabled mouse tracking
        //      (claude-code, hermes TUI, tmux with `mouse on`, less, vim
        //      with `set mouse=a` — basically any modern TUI; it's what
        //      makes hover-to-scroll work on desktop): xterm encodes the
        //      wheel as an SGR mouse-wheel escape (\e[<64;col;rowM for
        //      up / <65 for down) and forwards it to the PTY, so the TUI
        //      scrolls its own content natively.
        //   3. Alternate buffer + TUI has NOT enabled mouse tracking
        //      (rare on modern TUIs; mostly old curses apps): xterm
        //      ignores the wheel — safe no-op, no garbage injected.
        const wheelTarget = function () {
            return document.querySelector('.xterm-screen') ||
                   document.querySelector('.xterm') ||
                   document.getElementById('terminal');
        };
        const dispatchWheel = function (deltaY) {
            const target = wheelTarget();
            if (!target) {
                console.warn('scrollTerminal: no wheel target element found');
                return;
            }
            const rect = target.getBoundingClientRect();
            // Mouse position matters for SGR wheel encoding — use the
            // viewport center so TUIs that care (tmux split-pane) hit the
            // right pane instead of always the top-left cell.
            const clientX = rect.left + rect.width / 2;
            const clientY = rect.top + rect.height / 2;
            const evt = new WheelEvent('wheel', {
                deltaY: deltaY,
                deltaMode: 0, // DOM_DELTA_PIXEL
                bubbles: true,
                cancelable: true,
                clientX: clientX,
                clientY: clientY,
            });
            const altBuffer = (function () {
                try { return term.buffer.active.type === 'alternate'; }
                catch (_) { return false; }
            })();
            // Visible in logcat via TerminalWebView's onConsoleMessage —
            // confirms the wheel fired and on which buffer. If scroll is
            // not working in a TUI, this is the first thing to check:
            // no line here = gesture path broken; line present but no
            // TUI response = TUI hasn't enabled mouse tracking.
            console.log('dispatchWheel: deltaY=' + deltaY +
                ' altBuffer=' + altBuffer +
                ' target=' + (target.className || target.id));
            target.dispatchEvent(evt);
        };

        const lineHeightPx = function () {
            const size = term.options.fontSize || 13;
            const lh = term.options.lineHeight || 1.15;
            return Math.max(10, size * lh);
        };

        window.scrollTerminalLines = function (lines) {
            const n = Math.round(lines);
            if (n === 0) return;
            dispatchWheel(n * lineHeightPx());
        };
        window.scrollTerminalPages = function (pages) {
            const n = Math.round(pages);
            if (n === 0) return;
            dispatchWheel(n * lineHeightPx() * Math.max(1, term.rows - 2));
        };
        // Jump-to-bottom only makes sense in the main buffer (alt buffer is
        // always "at the bottom" — the TUI owns every visible row). In alt
        // buffer we simply no-op rather than guess what "bottom" means for
        // whichever app is running.
        window.scrollTerminalToBottom = function () {
            try {
                if (term.buffer.active.type === 'alternate') return;
                term.scrollToBottom();
            } catch (_) {}
        };
        window.scrollTerminalToTop = function () {
            try {
                if (term.buffer.active.type === 'alternate') return;
                term.scrollToTop();
            } catch (_) {}
        };

        (function installTouchScroll() {
            const root = document.getElementById('terminal');
            if (!root) return;
            let touchId = null;
            let startY = 0;
            let accumulated = 0;
            // lineHeightPx() is defined at module scope above — it already
            // tracks setFontSize() via term.options and returns a fresh
            // value per call, so we just use it directly here.
            const onStart = function (ev) {
                if (ev.touches.length !== 1) { touchId = null; return; }
                touchId = ev.touches[0].identifier;
                startY = ev.touches[0].clientY;
                accumulated = 0;
            };
            const onMove = function (ev) {
                if (touchId === null) return;
                let t = null;
                for (let i = 0; i < ev.touches.length; i++) {
                    if (ev.touches[i].identifier === touchId) { t = ev.touches[i]; break; }
                }
                if (!t) return;
                const dy = t.clientY - startY;
                // Only fire once past a small deadzone so long-press+select
                // isn't stolen from xterm.
                if (Math.abs(dy) < 12) return;
                const lh = lineHeightPx();
                const lines = Math.trunc((dy - accumulated) / lh);
                if (lines !== 0) {
                    // Route through the shared shim so alt-buffer detection
                    // kicks in — TUIs (claude-code, hermes, vim, less) live
                    // in the alt buffer and need real input events, while
                    // the shell's main buffer uses local scrollback.
                    // Finger down = older content, so we flip the sign.
                    window.scrollTerminalLines(-lines);
                    accumulated += lines * lh;
                    ev.preventDefault();
                }
            };
            const onEnd = function (ev) {
                for (let i = 0; i < ev.changedTouches.length; i++) {
                    if (ev.changedTouches[i].identifier === touchId) {
                        touchId = null;
                        return;
                    }
                }
            };
            // passive:false is required because we preventDefault above to
            // stop the browser from also hijacking the gesture for refresh
            // or selection.
            root.addEventListener('touchstart', onStart, { passive: true });
            root.addEventListener('touchmove', onMove, { passive: false });
            root.addEventListener('touchend', onEnd, { passive: true });
            root.addEventListener('touchcancel', onEnd, { passive: true });
        })();

        // Refit on any container size change. ResizeObserver is more reliable
        // than `window.resize` on Android WebView — the window doesn't always
        // fire `resize` when Compose resizes the parent View, so the initial
        // fit can latch at rows=1 (before Compose has measured) and never
        // recompute. ResizeObserver watches the element's content box directly
        // and fires whenever Compose grows/shrinks the WebView. Without this,
        // `ls` output scrolls straight off a 1-row viewport and users see
        // "typed a command, everything cleared, no output".
        let resizeTimeout = null;
        const terminalEl = document.getElementById('terminal');
        const scheduleFit = function () {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function () {
                try { fitAddon.fit(); } catch (_) {}
            }, 80);
        };
        if (typeof ResizeObserver !== 'undefined') {
            const resizeObserver = new ResizeObserver(scheduleFit);
            resizeObserver.observe(terminalEl);
        }
        // Keep the window.resize listener too — it still fires on orientation
        // change and covers edge cases where ResizeObserver isn't available.
        window.addEventListener('resize', scheduleFit);

        // Signal readiness to Android after two rAFs so the initial layout
        // has a chance to settle. ResizeObserver above will keep re-fitting
        // if the container grows after this first onReady call, and the
        // `resize(cols, rows)` bridge call syncs the server side.
        requestAnimationFrame(function () {
            try { fitAddon.fit(); } catch (_) {}
            requestAnimationFrame(function () {
                if (window.AndroidBridge && window.AndroidBridge.onReady) {
                    window.AndroidBridge.onReady(term.cols, term.rows);
                }
            });
        });

        // Diagnostic hook — Kotlin can read back the current grid size.
        window.getTerminalGeometry = function () {
            return JSON.stringify({ cols: term.cols, rows: term.rows });
        };

        // ── Search shims — driven by TerminalSearchBar.kt ────────────────
        // Each function returns a boolean so the Kotlin side can check
        // whether the search actually matched (for "no results" UX).
        // The try/catch is defensive: if the addon is missing or its API
        // changes, the terminal stays usable instead of throwing.
        window.searchNext = function (text) {
            if (!text || !searchAddon) return false;
            try { return !!searchAddon.findNext(text); } catch (_) { return false; }
        };
        window.searchPrev = function (text) {
            if (!text || !searchAddon) return false;
            try { return !!searchAddon.findPrevious(text); } catch (_) { return false; }
        };
        window.clearSearch = function () {
            if (!searchAddon) return;
            try {
                if (typeof searchAddon.clearDecorations === 'function') {
                    searchAddon.clearDecorations();
                }
            } catch (_) { /* old addon-search builds */ }
        };
    })();
    </script>
</body>
</html>
