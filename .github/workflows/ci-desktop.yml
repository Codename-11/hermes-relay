name: CI desktop

on:
  push:
    branches: [main, dev]
    paths:
      - 'desktop/**'
      - '.github/workflows/ci-desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/ci-desktop.yml'

permissions:
  contents: read

concurrency:
  group: ci-desktop-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

jobs:
  typecheck-and-build:
    name: Type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build (tsc → dist/)
        run: npm run build

      - name: Verify bin shim is executable
        # The published tarball depends on bin/hermes-relay.js having a valid
        # shebang + importing the freshly built dist/cli.js. Smoke the actual
        # invocation so we catch broken imports, missing main export, or a
        # prebuilt dist/ that references a source file that moved.
        run: node bin/hermes-relay.js --version

  smoke-help:
    name: Smoke — --help + --version work on every target OS
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: --version
        run: node bin/hermes-relay.js --version

      - name: --help
        run: node bin/hermes-relay.js --help

  tray-shell:
    name: Tray shell checks
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: npm ci

      - name: Cargo check tray shell
        run: npm run tray:check

      - name: Test tray shell
        run: npm run tray:test
