# Hermes-Relay — CI Pipeline
#
# Runs on every push to main and on pull requests targeting main.
# Pipeline: lint -> build + test (parallel) -> upload artifacts
#
# Android: Kotlin + Jetpack Compose (root Gradle project)
# Python:  aiohttp relay server (relay_server/)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR, but let main finish
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ──────────────────────────────────────────────
  # Android Lint — gate for build and test jobs
  # ──────────────────────────────────────────────
  lint:
    name: Lint (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Prefer ktlintCheck if configured; fall back to Android lint
      - name: Run lint checks
        run: |
          if ./gradlew tasks --all 2>/dev/null | grep -q "ktlintCheck"; then
            echo "Running ktlintCheck..."
            ./gradlew ktlintCheck
          else
            echo "ktlintCheck not found, falling back to Android lint..."
            ./gradlew lint
          fi

  # ──────────────────────────────────────────────
  # Android Build — assembleDebug + upload APK
  # ──────────────────────────────────────────────
  build:
    name: Build (Android)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          # Product flavors (googlePlay, sideload) nest APKs under
          # app/build/outputs/apk/<flavor>/debug/ — the `*` matches both.
          path: app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────
  # Android Tests — unit tests + report upload
  # ──────────────────────────────────────────────
  test:
    name: Test (Android)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew test

      # Upload test reports even if tests fail, for debugging
      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Python Relay — syntax check + future tests
  # ──────────────────────────────────────────────
  relay-check:
    name: Relay Check (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r relay_server/requirements.txt

      - name: Syntax check (plugin.relay — canonical location)
        run: |
          python -m py_compile plugin/relay/server.py
          python -m py_compile plugin/relay/channels/terminal.py
          python -m py_compile plugin/relay/channels/chat.py
          python -m py_compile plugin/relay/channels/bridge.py

      - name: Syntax check (relay_server shim)
        run: python -m py_compile relay_server/__init__.py relay_server/__main__.py

      # TODO: Add pytest step when relay tests exist
      # - name: Run tests
      #   run: pytest plugin/relay/tests/
