# Hermes Companion — CI Pipeline
#
# Runs on every push to main and on pull requests targeting main.
# Pipeline: lint -> build + test (parallel) -> upload artifacts
#
# Android: Kotlin + Jetpack Compose (companion-app/)
# Python:  aiohttp relay server (companion-relay/)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR, but let main finish
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ──────────────────────────────────────────────
  # Android Lint — gate for build and test jobs
  # ──────────────────────────────────────────────
  lint:
    name: Lint (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # gradle/actions/setup-gradle handles caching automatically
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Prefer ktlintCheck if configured; fall back to Android lint
      - name: Run lint checks
        working-directory: companion-app
        run: |
          if ./gradlew tasks --all 2>/dev/null | grep -q "ktlintCheck"; then
            echo "Running ktlintCheck..."
            ./gradlew ktlintCheck
          else
            echo "ktlintCheck not found, falling back to Android lint..."
            ./gradlew lint
          fi

  # ──────────────────────────────────────────────
  # Android Build — assembleDebug + upload APK
  # ──────────────────────────────────────────────
  build:
    name: Build (Android)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: companion-app
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: companion-app/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ──────────────────────────────────────────────
  # Android Tests — unit tests + report upload
  # ──────────────────────────────────────────────
  test:
    name: Test (Android)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        working-directory: companion-app
        run: ./gradlew test

      # Upload test reports even if tests fail, for debugging
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: companion-app/app/build/reports/tests/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Python Relay — syntax check + future tests
  # ──────────────────────────────────────────────
  relay-check:
    name: Relay Check (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r companion-relay/requirements.txt

      - name: Syntax check
        run: python -m py_compile companion-relay/relay.py

      # TODO: Add pytest step when relay tests exist
      # - name: Run tests
      #   run: pytest companion-relay/tests/
