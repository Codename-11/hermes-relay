# Hermes-Relay — Docs Deployment
#
# Builds VitePress docs and deploys to GitHub Pages.
# Triggers on pushes to main that change user-docs/ content,
# or manually via workflow_dispatch.

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'user-docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

# Sets permissions for GITHUB_TOKEN to enable Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for lastUpdated timestamps

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          # Node 24 ships npm 11, matching the npm that generates
          # user-docs/package-lock.json. On npm 10 (Node 20), `npm ci` rejects
          # the lock over the optional `search-insights` peer dep of bundled
          # docsearch. Keep this aligned with the npm used to write the lock.
          node-version: 24
          cache: npm
          cache-dependency-path: user-docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: user-docs

      - name: Build VitePress site
        run: npm run build
        working-directory: user-docs

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: user-docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
