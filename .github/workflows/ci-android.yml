# Hermes-Relay — Android CI Pipeline
#
# Runs on pushes to main/dev and on PRs targeting main/dev, scoped to
# Android-affecting paths so Python-only changes don't spin up the JVM.
#
# Pipeline: lint -> build + test (parallel) -> upload artifacts

name: CI — Android

on:
  push:
    branches: [main, dev]
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/ci-android.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/ci-android.yml"

# Cancel in-progress runs for the same branch/PR, but let main and dev finish
concurrency:
  group: ci-android-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

jobs:
  # ──────────────────────────────────────────────
  # Android Lint — gate for build and test jobs
  # ──────────────────────────────────────────────
  lint:
    name: Lint (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Prefer ktlintCheck if configured; fall back to Android lint
      - name: Run lint checks
        run: |
          if ./gradlew tasks --all 2>/dev/null | grep -q "ktlintCheck"; then
            echo "Running ktlintCheck..."
            ./gradlew ktlintCheck
          else
            echo "ktlintCheck not found, falling back to Android lint..."
            ./gradlew lint
          fi

  # ──────────────────────────────────────────────
  # Android Build — assembleDebug + upload APK
  # ──────────────────────────────────────────────
  build:
    name: Build (Android)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          # Product flavors (googlePlay, sideload) nest APKs under
          # app/build/outputs/apk/<flavor>/debug/ — the `*` matches both.
          path: app/build/outputs/apk/*/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────
  # Android Tests — unit tests + report upload
  #
  # Tests run on every branch but are ADVISORY on dev (push or PR) so WIP
  # commits don't block the merge queue. Strict on main — any PR retargeted
  # from dev → main will surface the real failures before release-merge.
  # ──────────────────────────────────────────────
  test:
    name: Test (Android)
    needs: lint
    runs-on: ubuntu-latest
    # Advisory on dev, strict on main. Evaluates to false (= strict) for
    # pushes to main and PRs whose base branch is main; true (= advisory)
    # for everything else (dev pushes, dev-targeted PRs, feature branches).
    continue-on-error: ${{ github.ref != 'refs/heads/main' && github.base_ref != 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew test

      # Upload test reports even if tests fail, for debugging
      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 7
