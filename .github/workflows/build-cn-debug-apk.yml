# 自定义工作流：编译中文版 debug APK（固定签名）并发布到 GitHub Releases
#
# 触发方式：
#   手动触发（Actions → Build CN APK → Run workflow）
#   —— 不随代码 push 自动触发，避免无意义的云编译消耗。
#
# 签名（固定密钥，推荐）：
#   在仓库 Settings → Secrets and variables → Actions 中配置：
#   - HERMES_KEYSTORE_BASE64  (base64 编码的 keystore 文件)
#   - HERMES_KEYSTORE_PASSWORD
#   - HERMES_KEY_ALIAS
#   - HERMES_KEY_PASSWORD
#   配置后，debug 构建将使用固定密钥签名，用户可在手机上直接覆盖升级。
#   未配置则回退为 Android 默认 debug 签名（每次构建密钥不同，需卸载重装）。
#
# 产物（两个独立 artifact）：
#   - cn-debug-apk-googleplay  (app/build/outputs/apk/googlePlay/debug/*.apk)
#   - cn-debug-apk-sideload    (app/build/outputs/apk/sideload/debug/*.apk)
#
# 发布：手动运行后自动创建 GitHub Release，tag / 标题带编译时间戳后缀以区分版本。
name: Build CN APK

on:
  workflow_dispatch:
    inputs:
      release_prefix:
        description: "Release 标签前缀（默认 cn-debug）"
        required: false
        default: "cn-debug"
        type: string

permissions:
  contents: write

concurrency:
  group: build-cn-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Publish CN Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # ─── 解码固定签名密钥（可选）──────────────────────────────────────────
      # 仅当仓库 Secrets 中配置了 HERMES_KEYSTORE_BASE64 时才解码。
      # 解码后把路径写入 HERMES_KEYSTORE_PATH，app/build.gradle.kts 的 debug
      # 构建类型会据此使用固定密钥签名（详见 app/build.gradle.kts）。
      - name: Decode release keystore (fixed signing)
        env:
          HERMES_KEYSTORE_BASE64: ${{ secrets.HERMES_KEYSTORE_BASE64 }}
        if: ${{ env.HERMES_KEYSTORE_BASE64 != '' }}
        run: |
          # 兼容两种格式：
          #   1) 纯 base64 文本（base64 -w0 生成）
          #   2) certutil 生成的 PEM（带 -----BEGIN/END CERTIFICATE----- 头尾行 + 换行）
          # 做法：删掉所有非 base64 内容行（以 '-' 开头，或不含 base64 字符），
          #       再去掉回车与换行，最后 base64 -d 解码。
          echo "$HERMES_KEYSTORE_BASE64" \
            | sed '/^-/d; /-----/d; /^[[:space:]]*$/d' \
            | tr -d '\r\n' \
            | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "HERMES_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "✅ 固定签名密钥已解码"

      - name: Build debug APK (both flavors, fixed-sign if keystore present)
        env:
          HERMES_KEYSTORE_PASSWORD: ${{ secrets.HERMES_KEYSTORE_PASSWORD }}
          HERMES_KEY_ALIAS: ${{ secrets.HERMES_KEY_ALIAS }}
          HERMES_KEY_PASSWORD: ${{ secrets.HERMES_KEY_PASSWORD }}
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --console=plain

      - name: Print APK outputs
        run: |
          echo "=== 构建输出 ==="
          find app/build/outputs/apk -name '*.apk' -print 2>/dev/null || echo "(无 APK 文件)"
          echo "=== 文件大小 ==="
          find app/build/outputs/apk -name '*.apk' -exec ls -lh {} \; 2>/dev/null || true

      # ─── 上传两个独立 artifact ─────────────────────────────────────────────
      - name: Upload googlePlay APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cn-debug-apk-googleplay
          path: app/build/outputs/apk/googlePlay/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload sideload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cn-debug-apk-sideload
          path: app/build/outputs/apk/sideload/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      # ─── 生成校验和并发布到 GitHub Releases ─────────────────────────────────
      - name: Generate SHA256 checksums
        run: |
          cd app/build/outputs
          find apk -name '*.apk' -exec sha256sum {} \; > SHA256SUMS.txt
          echo "=== SHA256 校验和 ==="
          cat SHA256SUMS.txt

      # 用编译时间戳生成 tag / 名称，区分每次构建版本
      - name: Compute release tag
        id: tag
        env:
          HERMES_KEYSTORE_BASE64: ${{ secrets.HERMES_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          TS=$(date +%Y%m%d-%H%M%S)
          echo "tag=${{ inputs.release_prefix }}-${TS}" >> "$GITHUB_OUTPUT"
          echo "ts=${TS}" >> "$GITHUB_OUTPUT"
          if [ -n "$HERMES_KEYSTORE_BASE64" ]; then
            echo "sign=✅ 固定签名（可覆盖升级）" >> "$GITHUB_OUTPUT"
          else
            echo "sign=⚠️ 默认 debug 签名（每次密钥不同，需卸载重装；建议在 Secrets 配置 HERMES_KEYSTORE_BASE64 启用固定签名）" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (timestamped)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Hermes-Relay CN Debug ${{ steps.tag.outputs.ts }}
          prerelease: true
          files: |
            app/build/outputs/apk/googlePlay/debug/*.apk
            app/build/outputs/apk/sideload/debug/*.apk
            app/build/outputs/SHA256SUMS.txt
          body: |
            ## Hermes-Relay CN 中文本地化版本（Debug 构建）

            - **签名**: ${{ steps.tag.outputs.sign }}
            - **版本**: 1.3.0
            - **构建时间**: ${{ steps.tag.outputs.ts }}
            - **分支**: feat/i18n-zh

            ### 功能
            - 完整中文本地化界面（聊天、管理、语音、设置全面汉化）
            - 保留上游所有功能
            - 两个版本：`googlePlay`（Play 兼容）和 `sideload`（完整功能，含 Device Control）

            > 手动触发构建，自动发布
        env:
          GITHUB_TOKEN: ${{ github.token }}
